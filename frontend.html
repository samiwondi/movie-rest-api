<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movie Review API</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; padding: 20px; }
        .container { max-width: 800px; margin: 0 auto; }
        .card { border: 1px solid #ddd; padding: 20px; margin-bottom: 20px; border-radius: 5px; }
        input, textarea { width: 100%; padding: 8px; margin: 5px 0 15px; border: 1px solid #ddd; }
        button { padding: 8px 15px; margin: 5px; cursor: pointer; background: #007bff; color: white; border: none; border-radius: 3px; }
        button:hover { background: #0056b3; }
        .delete-btn { background: #dc3545; }
        .delete-btn:hover { background: #c82333; }
        .movie-item { border: 1px solid #eee; padding: 10px; margin: 10px 0; display: flex; justify-content: space-between; align-items: center; }
        .error { color: red; }
        .success { color: green; }
        hr { margin: 20px 0; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Movie Review API</h1>
        
        <!-- Add Movie Form -->
        <div class="card">
            <h2>Add New Movie</h2>
            <input type="text" id="title" placeholder="Movie Title">
            <textarea id="review" placeholder="Movie Review"></textarea>
            <input type="number" id="rating" placeholder="Rating (1-10)" min="1" max="10">
            <button onclick="addMovie()">Add Movie</button>
        </div>

        <!-- Movies List -->
        <div class="card">
            <h2>Movies List</h2>
            <div id="moviesList">Loading...</div>
        </div>
    </div>

    <script>
        const API_BASE = '/api/movies';

        async function loadMovies() {
            try {
                const response = await fetch(API_BASE);
                const movies = await response.json();
                
                const container = document.getElementById('moviesList');
                
                if (!movies.success || movies.data.length === 0) {
                    container.innerHTML = '<p>No movies found. Add one above!</p>';
                    return;
                }
                
                container.innerHTML = movies.data.map(movie => `
                    <div class="movie-item">
                        <div>
                            <strong>${movie.title}</strong>
                            ${movie.rating ? `<br>Rating: ${movie.rating}/10` : ''}
                            ${movie.review ? `<br><small>${movie.review.substring(0, 100)}</small>` : ''}
                        </div>
                        <button class="delete-btn" onclick="deleteMovie(${movie.id})">Delete</button>
                    </div>
                `).join('');
            } catch (error) {
                document.getElementById('moviesList').innerHTML = '<p class="error">Error loading movies</p>';
                console.error('Error:', error);
            }
        }

        async function addMovie() {
            const title = document.getElementById('title').value.trim();
            const review = document.getElementById('review').value.trim();
            const rating = document.getElementById('rating').value;
            
            if (!title) {
                alert('Please enter a movie title');
                return;
            }
            
            const movieData = { title };
            if (review) movieData.review = review;
            if (rating) movieData.rating = parseInt(rating);
            
            try {
                const response = await fetch(API_BASE, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(movieData)
                });
                
                if (response.ok) {
                    // Clear form
                    document.getElementById('title').value = '';
                    document.getElementById('review').value = '';
                    document.getElementById('rating').value = '';
                    
                    // Reload movies
                    loadMovies();
                    alert('Movie added successfully!');
                } else {
                    alert('Failed to add movie');
                }
            } catch (error) {
                console.error('Error:', error);
                alert('Error adding movie');
            }
        }

        async function deleteMovie(id) {
            if (confirm('Are you sure you want to delete this movie?')) {
                try {
                    const response = await fetch(`${API_BASE}/${id}`, {
                        method: 'DELETE'
                    });
                    
                    if (response.ok) {
                        loadMovies();
                        alert('Movie deleted successfully!');
                    } else {
                        alert('Failed to delete movie');
                    }
                } catch (error) {
                    console.error('Error:', error);
                    alert('Error deleting movie');
                }
            }
        }

        // Load movies when page loads
        loadMovies();
    </script>
</body>
</html>
